# PolyAgent Swarm — Multi-Agent Trading Cluster
# Each agent scans its category, executes trades via CLOB, learns from PnL.
# All agents share a SwarmBrain SQLite DB for cross-instance learning.
#
# Quick start:  docker compose up -d
# Status:       docker compose ps
# Logs:         docker compose logs -f sports
# Stop:         docker compose down
# Metrics:      curl http://localhost:9090/metrics
#
# Requires Tor SOCKS5 on host: systemctl start tor@default

services:
  sports:
    build: .
    container_name: polyagent-sports
    restart: unless-stopped
    environment:
      POLYMARKET_GAMMA_IP: "104.18.34.205"
      POLYGONSCAN_API_KEY: "${POLYGONSCAN_API_KEY}"
      XAI_API_KEY: "${XAI_API_KEY}"
      TELEGRAM_BOT_TOKEN: "${TELEGRAM_BOT_TOKEN}"
      TELEGRAM_CHAT_ID: "${TELEGRAM_CHAT_ID}"
      POLYMARKET_PRIVATE_KEY: "${POLYMARKET_PRIVATE_KEY:-}"
      CLOB_PROXY_URL: "socks5://172.17.0.1:9050"
      STEALTH_CATEGORY: sports
    volumes:
      - swarm_brain:/app/data
      - ./state:/app/state

  geopolitics:
    build: .
    container_name: polyagent-geopolitics
    restart: unless-stopped
    environment:
      POLYMARKET_GAMMA_IP: "104.18.34.205"
      POLYGONSCAN_API_KEY: "${POLYGONSCAN_API_KEY}"
      XAI_API_KEY: "${XAI_API_KEY}"
      TELEGRAM_BOT_TOKEN: "${TELEGRAM_BOT_TOKEN}"
      TELEGRAM_CHAT_ID: "${TELEGRAM_CHAT_ID}"
      POLYMARKET_PRIVATE_KEY: "${POLYMARKET_PRIVATE_KEY:-}"
      CLOB_PROXY_URL: "socks5://172.17.0.1:9050"
      STEALTH_CATEGORY: geopolitics
    volumes:
      - swarm_brain:/app/data
      - ./state:/app/state

  tech:
    build: .
    container_name: polyagent-tech
    restart: unless-stopped
    environment:
      POLYMARKET_GAMMA_IP: "104.18.34.205"
      POLYGONSCAN_API_KEY: "${POLYGONSCAN_API_KEY}"
      XAI_API_KEY: "${XAI_API_KEY}"
      TELEGRAM_BOT_TOKEN: "${TELEGRAM_BOT_TOKEN}"
      TELEGRAM_CHAT_ID: "${TELEGRAM_CHAT_ID}"
      POLYMARKET_PRIVATE_KEY: "${POLYMARKET_PRIVATE_KEY:-}"
      CLOB_PROXY_URL: "socks5://172.17.0.1:9050"
      STEALTH_CATEGORY: tech
    volumes:
      - swarm_brain:/app/data
      - ./state:/app/state

  weather:
    build: .
    container_name: polyagent-weather
    restart: unless-stopped
    environment:
      POLYMARKET_GAMMA_IP: "104.18.34.205"
      POLYGONSCAN_API_KEY: "${POLYGONSCAN_API_KEY}"
      XAI_API_KEY: "${XAI_API_KEY}"
      TELEGRAM_BOT_TOKEN: "${TELEGRAM_BOT_TOKEN}"
      TELEGRAM_CHAT_ID: "${TELEGRAM_CHAT_ID}"
      POLYMARKET_PRIVATE_KEY: "${POLYMARKET_PRIVATE_KEY:-}"
      CLOB_PROXY_URL: "socks5://172.17.0.1:9050"
      STEALTH_CATEGORY: weather
    volumes:
      - swarm_brain:/app/data
      - ./state:/app/state

  orchestrator:
    build:
      context: .
      dockerfile: Dockerfile.orchestrator
    container_name: polyagent-orchestrator
    restart: unless-stopped
    ports:
      - "9090:9090"
      - "9091:9091"
    environment:
      POLYGONSCAN_API_KEY: "${POLYGONSCAN_API_KEY}"
    volumes:
      - swarm_brain:/app/data
      - ./state:/app/state

volumes:
  swarm_brain:
