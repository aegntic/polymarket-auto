# Redis configuration for memecoin-automation-swarm
bind 0.0.0.0
port 6379

# Persistence
save 60 1000
save 30 500
appendonly yes
appendfsync everysec

# Memory
maxmemory 512mb
maxmemory-policy allkeys-lru

# Streams config
# Consumer group blocking timeout
stream-node-max-bytes 4096
stream-node-max-entries 100
