apiVersion: 1

datasources:
  - name: ClickHouse
    type: grafana-clickhouse-datasource
    access: proxy
    url: http://clickhouse:8123
    isDefault: true
    jsonData:
      defaultDatabase: clonet
      port: 8123
      server: clickhouse
      username: default

  - name: Prometheus
    type: prometheus
    access: proxy
    url: http://localhost:9090

  - name: Loki
    type: loki
    access: proxy
    url: http://localhost:3100
